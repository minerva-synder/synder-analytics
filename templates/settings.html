<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synder Analytics — Settings</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { background: #F8FAFC; }
.navbar-brand { font-weight: 700; color: #4F46E5 !important; font-size: 1.4rem; }
.navbar { background: #fff; border-bottom: 1px solid #E2E8F0; }
.settings-card { max-width: 600px; margin: 40px auto; background: #fff; border-radius: 12px; border: 1px solid #E2E8F0; padding: 32px; }
</style>
</head>
<body>
<nav class="navbar navbar-light px-4">
  <span class="navbar-brand">📊 Synder Analytics</span>
  <div>
    <a href="/" class="btn btn-sm btn-outline-secondary me-2">← Dashboard</a>
    <a href="/logout" class="btn btn-sm btn-outline-danger">Logout</a>
  </div>
</nav>
<div class="settings-card">
  <h4 class="mb-4">⚙️ Admin Settings</h4>
  {% if saved %}
  <div class="alert alert-success">Settings saved successfully.</div>
  {% endif %}
  <form method="POST">
    <div class="mb-3">
      <label class="form-label fw-bold">HubSpot API Key</label>
      <input type="password" name="hubspot_api_key" class="form-control" value="{{ hubspot_api_key or '' }}" placeholder="pat-na1-xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx">
      <div class="form-text">Private app access token. Used to look up CSM and plan details from HubSpot.</div>
    </div>
    <button type="submit" class="btn btn-primary">Save Settings</button>
  </form>
</div>
</body>
</html>
