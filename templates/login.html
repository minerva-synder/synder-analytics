<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synder Analytics — Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { background: #F8FAFC; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.login-card { max-width: 400px; width: 100%; background: #fff; border-radius: 12px; border: 1px solid #E2E8F0; padding: 40px; }
.login-card h3 { font-weight: 700; color: #4F46E5; margin-bottom: 24px; }
</style>
</head>
<body>
<div class="login-card">
  <h3>📊 Synder Analytics</h3>
  <h5 class="mb-3">Admin Login</h5>
  {% if error %}
  <div class="alert alert-danger">{{ error }}</div>
  {% endif %}
  <form method="POST">
    <div class="mb-3">
      <label class="form-label">Username</label>
      <input type="text" name="username" class="form-control" required autofocus>
    </div>
    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" name="password" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-primary w-100">Login</button>
  </form>
</div>
</body>
</html>
